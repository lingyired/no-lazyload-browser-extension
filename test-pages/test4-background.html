<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试 4: 背景图片懒加载 (40个)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 { color: #333; }
        .description {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .bg-container {
            margin: 30px 0;
            padding: 20px;
            background: #fafafa;
            border-radius: 8px;
        }
        .lazy-bg {
            width: 100%;
            height: 300px;
            background-size: cover;
            background-position: center;
            background-color: #e0e0e0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 18px;
            margin: 10px 0;
        }
        .lazy-bg.loaded {
            color: transparent;
        }
        .status {
            display: none;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 15px;
            color: #4CAF50;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← 返回测试索引</a>
    <h1>测试页面 4: 背景图片懒加载 (40个)</h1>

    <div class="description">
        <strong>懒加载类型：</strong>背景图片 data-bg / data-background 模式<br>
        <strong>实现方式：</strong>背景 URL 存储在 data 属性中，滚动到视口时通过 JS 设置 background-image<br>
        <strong>扩展应禁用：</strong>data-bg 应立即应用到 background-image<br>
        <strong>背景数量：</strong>40 个
    </div>

    <div id="status" class="status">检测中...</div>

    <div style="height: 100px;">
        <p>向下滚动查看背景图片 ↓</p>
    </div>

    <!-- 40 个背景图片懒加载 - 动态生成 -->
    <div id="bg-container"></div>

    <script>
        // 动态生成 40 个背景
        const container = document.getElementById('bg-container');
        for (let i = 1; i <= 40; i++) {
            const attr = i % 2 === 0 ? 'data-background' : 'data-bg';
            container.innerHTML += `
                <div class="bg-container">
                    <h3>背景 ${i} (${attr})</h3>
                    <div class="lazy-bg"
                         ${attr}="https://picsum.photos/800/300?random=${i + 30}">
                        背景图片未加载
                    </div>
                </div>
            `;
        }

        // 背景图片懒加载实现
        function initBackgroundLazyLoad() {
            const lazyBgs = document.querySelectorAll('[data-bg], [data-background]');

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const el = entry.target;
                        const bgUrl = el.getAttribute('data-bg') ||
                                     el.getAttribute('data-background');

                        if (bgUrl) {
                            el.style.backgroundImage = `url(${bgUrl})`;
                            el.classList.add('loaded');
                            el.textContent = '';
                            console.log('[BG Lazy] Background loaded:', bgUrl);
                        }
                        observer.unobserve(el);
                    }
                });
            }, { rootMargin: '50px' });

            lazyBgs.forEach(el => observer.observe(el));
        }

        document.addEventListener('DOMContentLoaded', initBackgroundLazyLoad);

        // 检测状态
        function checkBackgrounds() {
            const bgElements = document.querySelectorAll('[data-bg], [data-background]');
            const total = bgElements.length;
            // 已加载的背景：style.backgroundImage 不为空且不为 'none'
            const loaded = Array.from(bgElements).filter(el => {
                const bg = el.style.backgroundImage;
                return bg && bg !== 'none' && bg.includes('url');
            }).length;

            // 检测扩展是否生效
            const eagerImages = document.querySelectorAll('img[loading="eager"]');
            const extensionActive = eagerImages.length > 0;

            let statusText = `加载进度: ${loaded}/${total} 个背景`;
            if (extensionActive && total > 0) {
                statusText += ' (扩展已生效)';
            }

            document.getElementById('status').textContent = statusText;
        }

        setInterval(checkBackgrounds, 1000);
        checkBackgrounds();
    </script>
</body>
</html>
