<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试 1: 原生懒加载 loading="lazy"</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 { color: #333; }
        .description {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .image-container {
            margin: 50px 0;
            padding: 20px;
            background: #fafafa;
            border-radius: 8px;
        }
        img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 10px 0;
        }
        .status {
            display: none;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 15px;
            color: #4CAF50;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← 返回测试索引</a>
    <h1>测试页面 1: 原生懒加载 loading="lazy"</h1>

    <div class="description">
        <strong>懒加载类型：</strong>HTML5 原生 loading="lazy"<br>
        <strong>预期行为：</strong>页面滚动时图片才会加载<br>
        <strong>扩展应禁用：</strong>所有图片应立即加载<br>
        <strong>图片数量：</strong>40 张
    </div>

    <div id="status" class="status">检测中...</div>

    <!-- 一些占位内容，让页面有滚动距离 -->
    <div style="height: 100px;">
        <p>向下滚动查看图片 ↓</p>
    </div>

    <!-- 40 张原生懒加载图片 - 动态生成 -->
    <div id="image-container"></div>

    <script>
        // 动态生成 40 张图片
        const container = document.getElementById('image-container');
        for (let i = 1; i <= 40; i++) {
            container.innerHTML += `
                <div class="image-container">
                    <h3>图片 ${i} (原生懒加载)</h3>
                    <img src="https://picsum.photos/800/400?random=${i}"
                         loading="lazy"
                         alt="Test image ${i}"
                         width="800" height="400">
                </div>
            `;
        }
        // 检测图片加载状态
        function checkImages() {
            // 检测所有带 src 的图片（原生懒加载图片都有 src）
            const images = document.querySelectorAll('img[src*="picsum.photos"]');
            const loaded = Array.from(images).filter(img => img.complete && img.naturalHeight > 0).length;
            const total = images.length;

            // 同时检测是否有图片被扩展处理过
            const eagerImages = document.querySelectorAll('img[loading="eager"]');
            const blockedByExtension = eagerImages.length > 0;

            let statusText = `加载进度: ${loaded}/${total} 张图片`;
            if (blockedByExtension && total > 0) {
                statusText += ' (扩展已生效)';
            }

            document.getElementById('status').textContent = statusText;

            return { loaded, total, blockedByExtension };
        }

        // 每秒检测一次
        setInterval(checkImages, 1000);
        checkImages();

        // 监听图片加载事件
        document.querySelectorAll('img').forEach(img => {
            img.addEventListener('load', () => {
                console.log(`[Native Lazy] Image loaded: ${img.src}`);
                checkImages();
            });
        });
    </script>
        });
    </script>
</body>
</html>
